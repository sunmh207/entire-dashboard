services:
  mysql:
    image: mysql:8.0
    container_name: entire-dashboard-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: entire-dashboard
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=50
    ports:
      - "3381:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  entire-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/sunmh207/entire-dashboard:0.1.1
    container_name: entire-dashboard
    ports:
      - "81:80"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: entire-dashboard
      DB_USERNAME: root
      DB_PASSWORD: root123456
      JWT_SECRET: ChangeThisSecretKeyInProduction
      APP_USERNAME: admin
      APP_PASSWORD: admin
      JAVA_OPTS: -Xms256m -Xmx512m
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
